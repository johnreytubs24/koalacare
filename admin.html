<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KoalaCare Admin Dashboard</title>

  <link rel="stylesheet" href="admin.css?v=12">
</head>

<body>

  <div id="pinScreen" class="pin-screen">
    <div class="pin-card">
      <div class="logo">🐨</div>
      <h1>KoalaCare Admin</h1>
      <p>Report with kindness. Act with fairness.</p>

      <input type="password" id="adminPin" placeholder="Enter Admin PIN">
      <button onclick="loginAdmin()">Login</button>

      <p id="pinMessage" class="message"></p>
    </div>
  </div>

  <div id="adminDashboard" class="container hidden">

    <header>
      <h1>🐨 KoalaCare Report System</h1>
      <p>Report with kindness. Act with fairness.</p>

      <div id="notificationBadge" class="notification-badge hidden">
        🔔 New Report Received
      </div>
    </header>

    <div class="stats">
      <div class="card">
        <h3 id="totalReports">0</h3>
        <span>Total Reports</span>
      </div>

      <div class="card">
        <h3 id="newReports">0</h3>
        <span>New</span>
      </div>

      <div class="card">
        <h3 id="urgentReports">0</h3>
        <span>Urgent</span>
      </div>
    </div>

    <div class="filters">
      <input 
        type="text" 
        id="searchBox" 
        placeholder="Search report, reporter, person, area..." 
        onkeyup="renderReports()"
      >

      <select id="statusFilter" onchange="renderReports()">
        <option value="">All Status</option>
        <option>New</option>
        <option>Under Review</option>
        <option>Resolved</option>
        <option>Archived</option>
      </select>

      <select id="categoryFilter" onchange="renderReports()">
        <option value="">All Categories</option>
        <option>Behavior Concern</option>
        <option>Bullying Concern</option>
        <option>Disrespect</option>
        <option>Classroom Property</option>
        <option>Safety Concern</option>
        <option>Cleanliness Concern</option>
        <option>Academic Concern</option>
        <option>Lost and Found</option>
        <option>Kindness Report</option>
        <option>Other</option>
      </select>

      <select id="sortFilter" onchange="renderReports()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="urgency">Urgency First</option>
        <option value="status">Status Priority</option>
        <option value="needsResponse">Needs Response First</option>
        <option value="category">Category A-Z</option>
        <option value="area">Area A-Z</option>
      </select>
    </div>

    <div id="reportsContainer"></div>
  </div>

  <div id="reportModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeReportModal()">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="admin.js?v=13"></script>
</body>
</html>
